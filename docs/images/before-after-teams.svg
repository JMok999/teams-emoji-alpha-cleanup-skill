<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Teams emoji transparency cleanup: before and after / Teams 表情透明背景处理：处理前和处理后</title>
  <desc id="desc">Left: emoji on a white background. Right: the same emoji with real alpha transparency. 左侧：带白底的表情。右侧：真实 Alpha 透明背景的表情。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f7f8fb"/><stop offset="1" stop-color="#eef1f7"/></linearGradient>
    <radialGradient id="face" cx="35%" cy="25%"><stop stop-color="#fff7aa"/><stop offset=".65" stop-color="#ffcf36"/><stop offset="1" stop-color="#f39712"/></radialGradient>
    <pattern id="check" width="32" height="32" patternUnits="userSpaceOnUse"><rect width="32" height="32" fill="#f0f1f4"/><rect width="16" height="16" fill="#fff"/><rect x="16" y="16" width="16" height="16" fill="#fff"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="70" y="70" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#1f2937">Teams Emoji Alpha Cleanup</text>
  <text x="70" y="108" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#667085">Before and after transparency reference · 透明背景处理前后对比</text>
  <g transform="translate(70 150)">
    <rect width="470" height="320" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="3"/>
    <text x="30" y="46" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#b42318">Before · 处理前</text>
    <text x="30" y="74" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#667085">Baked white background · 带白色背景</text>
    <rect x="145" y="94" width="190" height="190" rx="18" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
    <g transform="translate(170 114)" filter="url(#shadow)">
      <circle cx="70" cy="70" r="68" fill="url(#face)"/>
      <path d="M31 40 Q49 27 63 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <path d="M80 39 Q94 27 110 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="45" cy="68" rx="17" ry="21" fill="#fff"/><ellipse cx="94" cy="68" rx="17" ry="21" fill="#fff"/>
      <circle cx="47" cy="70" r="7" fill="#2b1b12"/><circle cx="92" cy="70" r="7" fill="#2b1b12"/>
      <path d="M45 108 Q70 129 98 108" fill="none" stroke="#6f381b" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="95" y="307" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#667085">White rectangle appears in Teams · Teams 出现白框</text>
  </g>
  <g transform="translate(660 150)">
    <rect width="470" height="320" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="3"/>
    <text x="30" y="46" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#027a48">After · 处理后</text>
    <text x="30" y="74" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#667085">Real alpha transparency · 真实 Alpha 透明</text>
    <rect x="145" y="94" width="190" height="190" rx="18" fill="url(#check)" stroke="#e5e7eb" stroke-width="2"/>
    <g transform="translate(170 114)" filter="url(#shadow)">
      <circle cx="70" cy="70" r="68" fill="url(#face)"/>
      <path d="M31 40 Q49 27 63 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <path d="M80 39 Q94 27 110 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="45" cy="68" rx="17" ry="21" fill="#fff"/><ellipse cx="94" cy="68" rx="17" ry="21" fill="#fff"/>
      <circle cx="47" cy="70" r="7" fill="#2b1b12"/><circle cx="92" cy="70" r="7" fill="#2b1b12"/>
      <path d="M45 108 Q70 129 98 108" fill="none" stroke="#6f381b" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="78" y="307" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#667085">Clean edge on every surface · 各种界面下边缘干净</text>
  </g>
  <text x="70" y="520" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#344054">Goal: true transparency, preserved internal details, no white halo · 目标：真实透明，保留内部细节，无白边</text>
</svg>