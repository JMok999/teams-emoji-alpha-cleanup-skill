<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Before and after Teams emoji transparency cleanup</title>
  <desc id="desc">Left: an emoji on a white background with a visible white box. Right: the same emoji cleaned with transparent background and smooth edge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f7f8fb"/><stop offset="1" stop-color="#eef1f7"/></linearGradient>
    <radialGradient id="face" cx="35%" cy="25%"><stop stop-color="#fff7aa"/><stop offset=".65" stop-color="#ffcf36"/><stop offset="1" stop-color="#f39712"/></radialGradient>
    <pattern id="check" width="32" height="32" patternUnits="userSpaceOnUse"><rect width="32" height="32" fill="#f0f1f4"/><rect width="16" height="16" fill="#fff"/><rect x="16" y="16" width="16" height="16" fill="#fff"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1f2937">Teams Emoji Alpha Cleanup</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="20" fill="#667085">Illustrative before / after reference</text>
  <g transform="translate(70 150)">
    <rect width="470" height="300" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="3"/>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#b42318">Before · baked white background</text>
    <rect x="145" y="75" width="190" height="190" rx="18" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
    <g transform="translate(170 95)" filter="url(#shadow)">
      <circle cx="70" cy="70" r="68" fill="url(#face)"/>
      <path d="M31 40 Q49 27 63 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <path d="M80 39 Q94 27 110 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="45" cy="68" rx="17" ry="21" fill="#fff"/><ellipse cx="94" cy="68" rx="17" ry="21" fill="#fff"/>
      <circle cx="47" cy="70" r="7" fill="#2b1b12"/><circle cx="92" cy="70" r="7" fill="#2b1b12"/>
      <path d="M45 108 Q70 129 98 108" fill="none" stroke="#6f381b" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="105" y="285" font-family="Arial, sans-serif" font-size="17" fill="#667085">White rectangle becomes visible in Teams</text>
  </g>
  <g transform="translate(660 150)">
    <rect width="470" height="300" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="3"/>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#027a48">After · real alpha transparency</text>
    <rect x="145" y="75" width="190" height="190" rx="18" fill="url(#check)" stroke="#e5e7eb" stroke-width="2"/>
    <g transform="translate(170 95)" filter="url(#shadow)">
      <circle cx="70" cy="70" r="68" fill="url(#face)"/>
      <path d="M31 40 Q49 27 63 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <path d="M80 39 Q94 27 110 39" fill="none" stroke="#5b371e" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="45" cy="68" rx="17" ry="21" fill="#fff"/><ellipse cx="94" cy="68" rx="17" ry="21" fill="#fff"/>
      <circle cx="47" cy="70" r="7" fill="#2b1b12"/><circle cx="92" cy="70" r="7" fill="#2b1b12"/>
      <path d="M45 108 Q70 129 98 108" fill="none" stroke="#6f381b" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="98" y="285" font-family="Arial, sans-serif" font-size="17" fill="#667085">Clean edge on any Teams surface</text>
  </g>
</svg>